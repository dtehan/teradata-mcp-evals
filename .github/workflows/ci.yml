name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  audit:
    name: Unit tests and case audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/test_checks.py tests/test_multi_turn.py tests/test_audit_cases.py -v

      - name: Audit ambiguous pair coverage
        run: uv run python audit_cases.py --strict
